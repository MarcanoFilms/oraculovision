# OraculoVision — example configuration
#
# Copy this file to one of:
#   - config.toml              (project root, for local development)
#   - ~/.config/oraculovision/config.toml   (recommended for production)
#
# Or set ORACULOVISION_CONFIG=/path/to/config.toml

[refresh]
# How often all panels auto-refresh (seconds).
interval_seconds = 30

[alerts]
# Minimum peer count before Node Status shows a red border.
min_peers = 8

# Mempool size (MB) that triggers a congestion warning.
mempool_congested_mb = 50.0

# Transaction count in mempool that triggers a congestion warning.
mempool_congested_tx = 5000

# Spam score threshold (0–100) for BIP-110 tip-block alert.
spam_block_score = 45

# Mempool Glass uses the full Block Template from your node (getblocktemplate).
# It analyzes every transaction the node would include — not a mempool sample.

[bitcoin]
# Active node profile (see [profiles.*] below).
active_profile = "local"

# Path to bitcoin-cli. Leave as "bitcoin-cli" if it is on your PATH,
# or set an absolute path (e.g. /usr/local/bin/bitcoin-cli).
cli_path = "bitcoin-cli"

# Bitcoin data directory. Leave empty to use the node default,
# or set explicitly (e.g. ~/.bitcoin).
datadir = ""

# Timeout (seconds) for gettxoutsetinfo. This RPC can take ~2 minutes.
# UTXO stats are not fetched on auto-refresh — press [u] in the dashboard.
utxo_timeout = 120.0

[profiles.local]
cli_path = "bitcoin-cli"
datadir = ""

# Example remote RPC profile (uncomment and set credentials to use):
# [profiles.remote-vps]
# rpcconnect = "10.0.0.5"
# rpcport = 8332
# rpcuser = "your_rpc_user"
# rpcpassword = "your_rpc_password"

# Example SSH transport (bitcoin-cli runs on the remote host):
# [profiles.ssh-node]
# ssh_target = "user@your-mining-host"
# cli_path = "bitcoin-cli"
# datadir = "/home/user/.bitcoin"

[ocean]
# Default Bitcoin payout address on Ocean (bc1...).
# Optional: press [o] in the dashboard to enter or change the address
# for the current session (session override takes priority over this value).
address = ""
# Payout threshold in BTC, used for the "Progress" bar in the earnings panel.
# Ocean reports this per-account; this is only the fallback when it doesn't.
payout_threshold = 0.001

[mining]
# Local mining economics — all optional. Left at the defaults below, the
# dashboard shows gross earnings only and nothing changes. Fill these in to
# see pool-fee-adjusted and electricity-adjusted net earnings.
# Total rig power draw in watts (e.g. a single Bitaxe ~15, an S19 ~3250).
power_watts = 0.0
# Electricity price per kWh, in the currency below.
power_cost_per_kwh = 0.0
# Currency label for power cost / profit figures.
currency = "USD"
# Pool fee percentage (Ocean is 0% on TIDES; some setups differ).
pool_fee_pct = 0.0
# BTC spot price in `currency`. Set this to also see power cost in sats and
# a net profit/day figure; leave 0 to show gross-minus-fee sats only.
btc_price = 0.0

[control]
# Read-only mode (default: true). When true, all node control/write RPCs
# are blocked. Set to false only if you want peer ban/disconnect actions.
read_only = true

[chain_health]
# Number of recent blocks to scan for Spam & Health (max 144).
scan_blocks = 48

[block_index]
# Persistent SQLite cache for analyzed block summaries.
enabled = true
# Leave empty for ~/.local/share/oraculovision/block_index.db
path = ""
max_entries = 5000

[export]
# Audit trail exports (JSON + CSV) from Block Explorer, Tx Inspector, Spam & Health.
directory = ""
json = true
csv = true

[detectors]
# Transaction detector plugins (pure analysis, no I/O).
enabled = ["builtin"]
# Add "example_dust" to flag sub-546-sat outputs as dust signals.

[address]
# Tx & Address Inspector settings.
scantxoutset_timeout = 90.0
max_vin_lookups = 4
mempool_scan_limit = 30

[ui]
# UI/UX presentation settings. All keys have safe defaults; existing
# config.toml files work unmodified even without this section.

# Dashboard mode: "pro" (all 8 screens, default) or "lite" (single-screen
# overview aimed at first-time node runners). Togglable at runtime via
# Ctrl+P → "Toggle Lite/Pro mode" or the sidebar menu.
mode = "pro"

# Color theme: "oracle" (default cyberpunk palette), "stream" (high-contrast
# for screen recording / YouTube at 1080p), or "dark" (Textual system dark).
theme = "oracle"

# Animate panel opacity briefly when switching between the 8 screens.
# Disable for Pi-class hardware or remote SSH sessions.
screen_transitions = true

# Show ASCII-art splash screen on launch (auto-dismisses after 2 s or keypress).
splash = true

# Show first-open contextual tooltips per panel (dismissed permanently after
# first view; stored in ~/.local/share/oraculovision/tooltips.json).
tooltips = true

# Rolling buffer size for Sparkline charts (peer count, mempool MB).
# Each sample ≈ refresh_interval_seconds apart.  60 ≈ 30 minutes at 30 s.
sparkline_samples = 60
[pyblock]
# Show community blocks found by the PyBLOCK DATUM pool (third-party data).
# Your own node metrics always remain the sovereign source of truth.
community_blocks = true
api_url = "https://pyblock.xyz:8443"
